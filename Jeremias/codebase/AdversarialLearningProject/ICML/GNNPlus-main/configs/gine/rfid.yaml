dataset:
  format: RFID
  name: rfid
  dir: ../../SaveAsTensors/SavedTensor
  num_workers: 4
  task: graph
  task_type: classification
  transductive: False
  split_index: 0
  split_mode: random
  split: [0.8, 0.1, 0.1]
  node_encoder: True
  node_encoder_name: TypeDictNodeEncoder
  node_encoder_num_types: 1
  edge_encoder: True
  edge_encoder_name: TypeDictEdgeEncoder
  edge_encoder_num_types: 1
train:
  mode: custom
  batch_size: 32
  eval_period: 1
  ckpt_period: 100
model:
  type: custom_gnn
  interface: rfid
  loss_fun: cross_entropy
  edge_decoding: dot
  graph_pooling: add
gnn:
  layer_type: gineconv
  layers_mp: 2
  dim_inner: 64
  dropout: 0.2
  agg: mean
  normalize_adj: False
optim:
  optimizer: adam
  base_lr: 0.01
  max_epoch: 100
  scheduler: cos
  num_warmup_epochs: 5
