out_dir: results
metric_best: accuracy

wandb:
  use: False
  project: rfid

dataset:
  format: RFID
  name: rfid
  dir: ../../SaveAsTensors/SavedTensor
  num_workers: 4
  task: graph
  task_type: classification
  transductive: False

  # splitting
  split_mode: random
  split: [0.8, 0.1, 0.1]   # train / val / test

  # encoders
  node_encoder: False     # you already provide node features
  edge_encoder: True      # IMPORTANT for GatedGCN
  edge_encoder_name: None # edge_attr already numeric
  edge_encoder_bn: False

train:
  mode: custom
  batch_size: 32
  eval_period: 1
  ckpt_period: 100

model:
  type: custom_gnn
  loss_fun: cross_entropy
  graph_pooling: mean

gnn:
  head: mlp_graph
  ffn: False

  layers_pre_mp: 1        # common for GatedGCN
  layers_mp: 4            # slightly deeper than GCN
  layers_post_mp: 2

  dim_inner: 128
  layer_type: gatedgcn

  act: relu
  dropout: 0.1            # lower than GCN
  residual: True          # GatedGCN benefits from residuals

optim:
  optimizer: adamW
  weight_decay: 0.0
  base_lr: 0.001
  max_epoch: 200
