out_dir: results
metric_best: accuracy

wandb:
  use: False
  project: rfid

dataset:
  format: RFID
  name: rfid
  dir: ../../SaveAsTensors/SavedTensor
  task: graph
  task_type: classification
  transductive: False
  split_mode: random
  split: [0.8, 0.1, 0.1]   # train / val / test
  node_encoder: False
  edge_encoder: False

train:
  mode: custom
  batch_size: 32
  eval_period: 1
  ckpt_period: 100

model:
  type: custom_gnn
  loss_fun: cross_entropy
  graph_pooling: mean

gnn:
  head: mlp_graph
  layers_pre_mp: 1
  layers_mp: 3
  layers_post_mp: 2
  dim_inner: 128
  layer_type: gcn
  act: relu
  dropout: 0.2
  residual: False

optim:
  optimizer: adam
  base_lr: 0.001
  max_epoch: 150
