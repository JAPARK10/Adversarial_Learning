# rfid.yaml  –  GNNPlus config for RFID gesture recognition
# with domain-adversarial user-invariant training (EUIGR-style)
#
# NEW keys vs original:

out_dir: results
metric_best: accuracy

# ── ADVERSARIAL SETTINGS (NEW) ────────────────────────────────────────────────

dataset:
  format: RFID
  name: rfid
  dir: /Users/farhan/Downloads/projectcourse1/ICML/GNNPlus-main/RFIDDataSet
  task: graph
  task_type: classification
  transductive: False
  split_mode: random
  split: [0.8, 0.1, 0.1]
  node_encoder: False
  edge_encoder: False

train:
  mode: custom
  batch_size: 32
  eval_period: 1

model:
  type: custom_gnn
  loss_fun: cross_entropy
  graph_pooling: mean

gnn:
  layers_pre_mp: 1
  layers_mp: 3
  layers_post_mp: 2
  dim_inner: 128
  layer_type: gcn
  act: relu
  dropout: 0.2

optim:
  optimizer: adam
  base_lr: 0.001
  max_epoch: 150
