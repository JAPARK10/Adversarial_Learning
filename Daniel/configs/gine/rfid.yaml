out_dir: results
metric_best: accuracy

wandb:
  use: False
  project: rfid

dataset:
  format: RFID
  name: rfid
  dir: C:\Users\PC\Desktop\AdversarialLearningProject 1\ICML\GNNPlus-main\RFIDDataSet\DataSet1
  task: graph
  task_type: classification
  transductive: False

  # splitting
  split_mode: random
  split: [0.8, 0.1, 0.1]

  # encoders
  node_encoder: False
  edge_encoder: True              # Required for GINE
  edge_encoder_name: Linear       # IMPORTANT CHANGE
  edge_encoder_bn: False

train:
  mode: custom
  batch_size: 32
  eval_period: 1
  ckpt_period: 100

model:
  type: custom_gnn
  loss_fun: cross_entropy
  graph_pooling: mean

gnn:
  head: mlp_graph
  ffn: False

  layers_pre_mp: 1
  layers_mp: 3
  layers_post_mp: 2

  dim_inner: 128
  layer_type: gine               

  act: relu
  dropout: 0.3                   # Slightly higher than GatedGCN
  residual: False                # Often better for GINE

optim:
  optimizer: adamW
  weight_decay: 0.001           # GINE benefits from mild regularization
  base_lr: 0.001
  max_epoch: 200
